{{- if .Values.searchService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: search-service
spec:
  replicas: {{ .Values.searchService.replicaCount }}
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      initContainers:
        {{- include "ecommerce.waitForPort" (dict "name" "elasticsearch" "host" "elasticsearch" "port" "9200") | nindent 8 }}
      containers:
        - name: search-service
          image: {{ include "ecommerce.image" (dict "repo" .Values.searchService.image.repository "tag" .Values.searchService.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8087
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            {{- toYaml .Values.searchService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 80
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: search-service
spec:
  selector:
    app: search-service
  ports:
    - port: 8087
      targetPort: 8087
{{- end }}
