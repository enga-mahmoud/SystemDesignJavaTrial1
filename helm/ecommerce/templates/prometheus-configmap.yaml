{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      {{- if .Values.serviceRegistry.enabled }}
      - job_name: service-registry
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['service-registry:8761']
      {{- end }}

      {{- if .Values.configServer.enabled }}
      - job_name: config-server
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['config-server:8888']
      {{- end }}

      {{- if .Values.apiGateway.enabled }}
      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['api-gateway:8080']
      {{- end }}

      {{- if .Values.userService.enabled }}
      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['user-service:8081']
      {{- end }}

      {{- if .Values.productService.enabled }}
      - job_name: product-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['product-service:8082']
      {{- end }}

      {{- if .Values.inventoryService.enabled }}
      - job_name: inventory-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['inventory-service:8083']
      {{- end }}

      {{- if .Values.orderService.enabled }}
      - job_name: order-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['order-service:8084']
      {{- end }}

      {{- if .Values.paymentService.enabled }}
      - job_name: payment-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['payment-service:8085']
      {{- end }}

      {{- if .Values.notificationService.enabled }}
      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['notification-service:8086']
      {{- end }}

      {{- if .Values.searchService.enabled }}
      - job_name: search-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['search-service:8087']
      {{- end }}
{{- end }}
