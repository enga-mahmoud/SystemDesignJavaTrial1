# ─── Global ───────────────────────────────────────────────────────────────────
global:
  imageTag: latest
  imagePullPolicy: IfNotPresent
  storageClass: ""          # leave empty to use cluster default

# Create the namespace as part of the release (disable if pre-existing)
namespaceCreate: true

# ─── Secrets ──────────────────────────────────────────────────────────────────
secrets:
  dbPassword: postgres
  jwtSecret: myVerySecretKeyForDevelopmentPurposesOnly1234567890
  mail:
    username: your-email@gmail.com
    password: your-mail-app-password

# ─── PostgreSQL (one StatefulSet per service database) ────────────────────────
postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 5Gi
  databases:
    - name: user
      dbName: user_db
    - name: product
      dbName: product_db
    - name: inventory
      dbName: inventory_db
    - name: order
      dbName: order_db
    - name: payment
      dbName: payment_db
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

# ─── Kafka (KRaft single-broker) ──────────────────────────────────────────────
kafka:
  enabled: true
  image: bitnami/kafka:3.7.1
  storage: 10Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m

# ─── Redis ────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7.2-alpine
  storage: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# ─── Elasticsearch ────────────────────────────────────────────────────────────
elasticsearch:
  enabled: true
  image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  storage: 10Gi
  javaOpts: "-Xms512m -Xmx1g"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

# ─── Zipkin ───────────────────────────────────────────────────────────────────
zipkin:
  enabled: true
  image: openzipkin/zipkin:3.1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image: prom/prometheus:v2.50.1
  storage: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  image: grafana/grafana:10.3.1
  adminPassword: admin
  storage: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# ─── Application Services ─────────────────────────────────────────────────────

serviceRegistry:
  enabled: true
  image:
    repository: ecommerce/service-registry
    tag: ""
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

