      memory: 768Mi
      cpu: 500m

productService:
  enabled: true
  image:
    repository: ecommerce/product-service
    tag: ""
  replicaCount: 1
  resources:
    requests:
      memory: 384Mi
      cpu: 250m
    limits:
      memory: 768Mi
      cpu: 500m

inventoryService:
  enabled: true
  image:
    repository: ecommerce/inventory-service
    tag: ""
  replicaCount: 1
  resources:
    requests:
      memory: 384Mi
      cpu: 250m
    limits:
      memory: 768Mi
      cpu: 500m

orderService:
  enabled: true
  image:
    repository: ecommerce/order-service
    tag: ""
  replicaCount: 1
  resources:
    requests:
      memory: 384Mi
      cpu: 250m
    limits:
