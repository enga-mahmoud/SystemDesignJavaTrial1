frontend:
  enabled: true
  image:
    repository: ecommerce/frontend
    tag: ""
  replicaCount: 1
  service:
    type: LoadBalancer
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  ingressClassName: nginx
  host: ecommerce.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
