apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://elasticsearch:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'; do echo "waiting for elasticsearch"; sleep 5; done
      containers:
        - name: search-service
          image: ecommerce/search-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            requests:
              memory: 384Mi
              cpu: 250m
            limits:
              memory: 768Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 80
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: ecommerce
spec:
  selector:
    app: search-service
  ports:
    - port: 8087
      targetPort: 8087
