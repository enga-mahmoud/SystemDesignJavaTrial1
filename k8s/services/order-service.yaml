apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-order 5432; do echo "waiting for postgres-order"; sleep 3; done
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://config-server:8888/actuator/health | grep -q UP; do echo "waiting for config-server"; sleep 5; done
      containers:
        - name: order-service
          image: ecommerce/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: CONFIG_SERVER_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CONFIG_SERVER_URI
            - name: EUREKA_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EUREKA_URI
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_SERVERS
            - name: DB_HOST
              value: postgres-order
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: order_db
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            requests:
              memory: 384Mi
              cpu: 250m
            limits:
              memory: 768Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 80
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
spec:
  selector:
    app: order-service
  ports:
    - port: 8084
      targetPort: 8084
