<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <i class="fas fa-shopping-bag"></i>
      <span>ShopHub</span>
    </div>

    <h2>Create account</h2>
    <p class="auth-subtitle">Join ShopHub today — it's free</p>

    <div *ngIf="error$ | async as error" class="alert-error">{{ error }}</div>
    <div *ngIf="success$ | async" class="alert-success">
      Account created! <a routerLink="/login">Sign in now</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
        <span *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="field-error">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Choose a username" />
        <span *ngIf="form.get('username')?.invalid && form.get('username')?.touched" class="field-error">
          Username required (min 3 characters)
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Min 8 characters" />
        <span *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="field-error">
          Password required (min 8 characters)
        </span>
      </div>

      <button type="submit" class="btn-auth" [disabled]="form.invalid || (loading$ | async)">
        <span *ngIf="!(loading$ | async)"><i class="fas fa-user-plus" style="margin-right:6px"></i>Create Account</span>
        <span *ngIf="loading$ | async"><i class="fas fa-spinner fa-spin" style="margin-right:6px"></i>Creating…</span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
