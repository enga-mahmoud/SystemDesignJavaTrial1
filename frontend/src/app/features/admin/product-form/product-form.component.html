<div class="admin-page">
  <div class="admin-header">
    <h1 class="admin-title">{{ isEdit ? 'Edit Product' : 'New Product' }}</h1>
    <a class="btn-secondary" routerLink="/admin">← Back to Products</a>
  </div>

  <div *ngIf="error$ | async as error" class="alert-error">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="product-form">

    <div class="form-group">
      <label for="name">Product Name *</label>
      <input id="name" type="text" formControlName="name" placeholder="e.g. Wireless Headphones" />
      <span class="field-error"
            *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Name is required.
      </span>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="4"
                placeholder="Describe the product…"></textarea>
    </div>

    <div class="form-group">
      <label for="price">Price (USD) *</label>
      <input id="price" type="number" formControlName="price" min="0.01" step="0.01"
             placeholder="0.00" />
      <span class="field-error"
            *ngIf="form.get('price')?.invalid && form.get('price')?.touched">
        A valid price greater than 0 is required.
      </span>
    </div>

    <div class="form-group">
      <label for="categoryId">Category ID <span class="optional">(optional)</span></label>
      <input id="categoryId" type="text" formControlName="categoryId"
             placeholder="UUID of the category" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary"
              [disabled]="submitting$ | async">
        {{ (submitting$ | async) ? 'Saving…' : (isEdit ? 'Save Changes' : 'Create Product') }}
      </button>
      <a class="btn-secondary" routerLink="/admin">Cancel</a>
    </div>

  </form>
</div>
